<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PulseChord</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%23a855f7'/><path d='M8 16 Q16 6 24 16 Q16 26 8 16Z' fill='white' opacity='0.9'/></svg>">
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css">
</head>
<body>

  <!-- HEADER -->
  <header class="app-header">
    <div class="logo">
      <svg width="26" height="26" viewBox="0 0 32 32" fill="none" aria-label="PulseChord">
        <rect width="32" height="32" rx="8" fill="url(#lg)"/>
        <path d="M8 16 Q16 5 24 16 Q16 27 8 16Z" fill="white" opacity="0.92"/>
        <defs>
          <linearGradient id="lg" x1="0" y1="0" x2="32" y2="32">
            <stop offset="0%" stop-color="#a855f7"/>
            <stop offset="100%" stop-color="#6366f1"/>
          </linearGradient>
        </defs>
      </svg>
      <span>PulseChord</span>
    </div>

    <div class="header-center">
      <!-- Tonalité -->
      <label class="ctrl-label">Key
        <select id="sel-root" class="sel">
          <option>C</option><option>C#</option><option>D</option><option>D#</option>
          <option>E</option><option>F</option><option>F#</option><option>G</option>
          <option>G#</option><option>A</option><option>A#</option><option>B</option>
        </select>
      </label>
      <!-- Gamme -->
      <label class="ctrl-label">Scale
        <select id="sel-scale" class="sel">
          <option value="major">Major</option>
          <option value="minor" selected>Minor</option>
          <option value="pentatonic">Pentatonic</option>
          <option value="blues">Blues</option>
          <option value="dorian">Dorian</option>
          <option value="lydian">Lydian</option>
        </select>
      </label>
      <!-- Preset -->
      <label class="ctrl-label">Preset
        <select id="sel-preset" class="sel">
          <option value="omnicord">Omnicord</option>
          <option value="electric">Electric</option>
          <option value="ambient">Ambient</option>
          <option value="bass">Bass Synth</option>
          <option value="bells">Bells</option>
        </select>
      </label>
    </div>

    <div class="header-right">
      <span class="badge" id="status-badge">IDLE</span>
    </div>
  </header>

  <!-- MAIN -->
  <main class="app-main">

    <!-- ACCORDS -->
    <section class="section-chords">
      <div class="chord-rows" id="chord-grid">
        <!-- généré par JS -->
      </div>
    </section>

    <!-- PANNEAU CENTRAL : mélodie + effets -->
    <section class="section-center">

      <!-- Visualiseur -->
      <canvas id="visualizer" width="900" height="60" aria-hidden="true"></canvas>

      <!-- Surface mélodie -->
      <div class="melody-surface" id="melody-surface" aria-label="Surface mélodique">
        <!-- généré par JS -->
      </div>

      <!-- Barre d'effets -->
      <div class="fx-bar glass">
        <div class="fx-group">
          <label>Octave <b id="val-octave">4</b></label>
          <input type="range" id="ctrl-octave" min="2" max="7" value="4" step="1">
        </div>
        <div class="fx-group">
          <label>Filter <b id="val-filter">8k</b></label>
          <input type="range" id="ctrl-filter" min="200" max="18000" value="8000" step="100">
        </div>
        <div class="fx-group">
          <label>Reverb <b id="val-reverb">20%</b></label>
          <input type="range" id="ctrl-reverb" min="0" max="1" value="0.2" step="0.01">
        </div>
        <div class="fx-group">
          <label>Delay <b id="val-delay">0%</b></label>
          <input type="range" id="ctrl-delay" min="0" max="0.8" value="0" step="0.01">
        </div>
        <div class="fx-group">
          <label>Strum <b id="val-strum">60ms</b></label>
          <input type="range" id="ctrl-strum" min="10" max="200" value="60" step="5">
        </div>
        <div class="fx-group">
          <label>Volume <b id="val-volume">80%</b></label>
          <input type="range" id="ctrl-volume" min="0" max="1" value="0.8" step="0.01">
        </div>
      </div>

      <!-- Recorder -->
      <div class="recorder glass">
        <button id="btn-rec"><span class="rec-dot"></span>REC</button>
        <span id="rec-timer">00:00</span>
        <button id="btn-stop" disabled>■ STOP</button>
        <button id="btn-export" disabled>↓ MP3</button>
        <span id="rec-info">Joue un accord ou la surface pour commencer.</span>
      </div>

    </section>

  </main>

  <!-- Keyboard hint -->
  <div class="kb-bar">
    <span><kbd>A</kbd>–<kbd>'</kbd> Mélodie &nbsp;|&nbsp; <kbd>1</kbd>–<kbd>8</kbd> Accords &nbsp;|&nbsp; <kbd>Z</kbd>/<kbd>X</kbd> Oct− / Oct+ &nbsp;|&nbsp; <kbd>R</kbd> Rec &nbsp;|&nbsp; <kbd>Espace</kbd> Strum</span>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@breezystack/lamejs@1.2.7/lame.min.js"></script>
  <script src="./audio.js"></script>
  <script src="./app.js"></script>
</body>
</html>
