<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PulseChord</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%23a855f7'/><path d='M8 16 Q16 6 24 16 Q16 26 8 16Z' fill='white' opacity='0.9'/></svg>">
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css">
</head>
<body>

  <header class="app-header">
    <div class="logo">
      <svg width="28" height="28" viewBox="0 0 32 32" fill="none" aria-label="PulseChord logo">
        <rect width="32" height="32" rx="8" fill="url(#lg)"/>
        <path d="M8 16 Q16 5 24 16 Q16 27 8 16Z" fill="white" opacity="0.92"/>
        <defs>
          <linearGradient id="lg" x1="0" y1="0" x2="32" y2="32">
            <stop offset="0%" stop-color="#a855f7"/>
            <stop offset="100%" stop-color="#6366f1"/>
          </linearGradient>
        </defs>
      </svg>
      <span class="logo-text">PulseChord</span>
    </div>
    <div class="header-actions">
      <span class="badge" id="status-badge">IDLE</span>
      <button class="btn-icon" data-theme-toggle aria-label="Toggle theme">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
    </div>
  </header>

  <main class="app-layout">

    <!-- COLONNE GAUCHE : Sound Design -->
    <aside class="panel panel-left glass" aria-label="Sound Design">
      <h2 class="panel-title">Sound Design</h2>

      <div class="control-group">
        <label>Moteur</label>
        <div class="btn-group" id="engine-select">
          <button class="btn-seg active" data-engine="lead">Lead</button>
          <button class="btn-seg" data-engine="pad">Pad</button>
          <button class="btn-seg" data-engine="bass">Bass</button>
          <button class="btn-seg" data-engine="keys">Keys</button>
        </div>
      </div>

      <div class="control-group">
        <label>Onde <span class="value-tag" id="wave-label">Sawtooth</span></label>
        <div class="btn-group" id="wave-select">
          <button class="btn-seg active" data-wave="sawtooth" title="Sawtooth">&#9663;</button>
          <button class="btn-seg" data-wave="square" title="Square">&#9645;</button>
          <button class="btn-seg" data-wave="triangle" title="Triangle">&#9651;</button>
          <button class="btn-seg" data-wave="sine" title="Sine">&#8767;</button>
        </div>
      </div>

      <div class="control-group">
        <label>Attaque <span class="value-tag" id="attack-val">0.010s</span></label>
        <input type="range" id="attack" min="0.001" max="2" step="0.001" value="0.01" class="knob-slider">
      </div>
      <div class="control-group">
        <label>Release <span class="value-tag" id="release-val">0.40s</span></label>
        <input type="range" id="release" min="0.05" max="4" step="0.01" value="0.4" class="knob-slider">
      </div>
      <div class="control-group">
        <label>Octave <span class="value-tag" id="octave-val">4</span></label>
        <input type="range" id="octave" min="2" max="7" step="1" value="4" class="knob-slider">
      </div>
      <div class="control-group">
        <label>Detune <span class="value-tag" id="detune-val">0 ct</span></label>
        <input type="range" id="detune" min="-50" max="50" step="1" value="0" class="knob-slider">
      </div>
      <div class="control-group">
        <label>Glide <span class="value-tag" id="glide-val">OFF</span></label>
        <input type="range" id="glide" min="0" max="0.5" step="0.01" value="0" class="knob-slider">
      </div>

      <hr class="divider">
      <h3 class="panel-subtitle">Effets</h3>

      <div class="control-group">
        <label>Filter <span class="value-tag" id="filter-val">8000 Hz</span></label>
        <input type="range" id="filter" min="200" max="18000" step="50" value="8000" class="knob-slider accent-filter">
      </div>
      <div class="control-group">
        <label>Resonance <span class="value-tag" id="reso-val">1.0</span></label>
        <input type="range" id="resonance" min="0.5" max="25" step="0.5" value="1" class="knob-slider accent-filter">
      </div>
      <div class="control-group">
        <label>Reverb <span class="value-tag" id="reverb-val">20%</span></label>
        <input type="range" id="reverb" min="0" max="1" step="0.01" value="0.2" class="knob-slider accent-reverb">
      </div>
      <div class="control-group">
        <label>Delay <span class="value-tag" id="delay-val">0%</span></label>
        <input type="range" id="delay-mix" min="0" max="0.8" step="0.01" value="0" class="knob-slider accent-delay">
      </div>
      <div class="control-group">
        <label>Distortion <span class="value-tag" id="dist-val">0</span></label>
        <input type="range" id="distortion" min="0" max="400" step="5" value="0" class="knob-slider accent-dist">
      </div>
      <div class="control-group">
        <label>Bitcrush <span class="value-tag" id="bit-val">OFF</span></label>
        <input type="range" id="bitcrush" min="1" max="16" step="1" value="16" class="knob-slider accent-dist">
      </div>
      <div class="control-group">
        <label>Volume <span class="value-tag" id="vol-val">80%</span></label>
        <input type="range" id="volume" min="0" max="1" step="0.01" value="0.8" class="knob-slider">
      </div>
    </aside>

    <!-- CENTRE -->
    <section class="panel panel-center" aria-label="Instrument">

      <div class="top-controls glass">
        <div class="select-group">
          <label>Tonalité</label>
          <select id="root-note" class="select-input">
            <option>C</option><option>C#</option><option>D</option><option>D#</option>
            <option>E</option><option>F</option><option>F#</option><option>G</option>
            <option>G#</option><option>A</option><option>A#</option><option>B</option>
          </select>
        </div>
        <div class="select-group">
          <label>Gamme</label>
          <select id="scale" class="select-input">
            <option value="minor">Mineure</option>
            <option value="major">Majeure</option>
            <option value="pentatonic">Pentatonique</option>
            <option value="blues">Blues</option>
            <option value="dorian">Dorien</option>
            <option value="phrygian">Phrygien</option>
            <option value="lydian">Lydien</option>
            <option value="mixolydian">Mixolydien</option>
          </select>
        </div>
        <div class="select-group">
          <label>Arpège</label>
          <select id="arp-mode" class="select-input">
            <option value="off">OFF</option>
            <option value="up">Up</option>
            <option value="down">Down</option>
            <option value="updown">Up+Down</option>
            <option value="random">Random</option>
          </select>
        </div>
        <div class="select-group">
          <label>BPM <span class="value-tag" id="bpm-val">120</span></label>
          <input type="range" id="bpm" min="60" max="200" step="1" value="120" class="knob-slider" style="width:90px">
        </div>
        <div class="select-group">
          <label>Swing <span class="value-tag" id="swing-val">0%</span></label>
          <input type="range" id="swing" min="0" max="0.5" step="0.01" value="0" class="knob-slider" style="width:80px">
        </div>
      </div>

      <div class="chord-section">
        <h2 class="section-label">Accords</h2>
        <div class="chord-grid" id="chord-grid"></div>
      </div>

      <div class="melody-section">
        <h2 class="section-label">Mélodie</h2>
        <div class="melody-grid" id="melody-grid"></div>
      </div>

      <div class="visualizer-wrapper">
        <canvas id="visualizer" width="700" height="70" aria-hidden="true"></canvas>
      </div>

      <div class="recorder-bar glass">
        <button class="btn-rec" id="btn-rec" aria-label="Enregistrer">
          <span class="rec-dot"></span> REC
        </button>
        <div class="rec-timer" id="rec-timer">00:00</div>
        <button class="btn-stop" id="btn-stop" disabled>&#9646;&#9646; STOP</button>
        <button class="btn-export" id="btn-export" disabled>&#8681; Export</button>
        <div class="rec-info" id="rec-info">Lance une REC puis joue.</div>
      </div>

    </section>

    <!-- COLONNE DROITE : Séquenceur -->
    <aside class="panel panel-right glass" aria-label="Séquenceur">
      <h2 class="panel-title">Séquenceur</h2>

      <div class="control-group">
        <label>Steps <span class="value-tag" id="steps-val">8</span></label>
        <input type="range" id="seq-steps" min="4" max="16" step="4" value="8" class="knob-slider">
      </div>

      <div class="seq-grid" id="seq-grid"></div>

      <div class="control-group" style="margin-top:var(--space-4)">
        <button class="btn-primary full-width" id="seq-play">&#9654; Play</button>
      </div>
      <div class="control-group">
        <button class="btn-ghost full-width" id="seq-stop">&#9646; Stop</button>
      </div>
      <div class="control-group">
        <button class="btn-ghost full-width" id="seq-clear">&#10005; Clear</button>
      </div>

      <hr class="divider">
      <h3 class="panel-subtitle">Presets</h3>
      <div class="preset-list">
        <button class="btn-preset" data-preset="techno">Techno Dark</button>
        <button class="btn-preset" data-preset="ambient">Ambient Glow</button>
        <button class="btn-preset" data-preset="trap">Trap 808</button>
        <button class="btn-preset" data-preset="melodic">Mélodique</button>
      </div>
    </aside>

  </main>

  <script src="./audio.js"></script>
  <script src="./app.js"></script>
</body>
</html>
